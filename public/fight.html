<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Mud Fighter MVP</title>
<style>
*{box-sizing:border-box;touch-action:none}
body{margin:0;font-family:Arial,sans-serif;background:#171717;color:white;overflow:hidden}
.top{height:92px;padding:12px;background:#111;border-bottom:3px solid #333}
h1{margin:0;text-align:center;font-size:24px}
.hud{display:flex;gap:12px;align-items:center;justify-content:center;margin-top:10px}
.hp-wrap{width:38vw;max-width:420px;height:24px;background:#3a0b0b;border:2px solid white;border-radius:12px;overflow:hidden}
.hp{height:100%;width:100%;background:linear-gradient(90deg,#18d44a,#b7ff39);transition:width .2s}
.timer{font-size:24px;font-weight:900;background:#222;border:2px solid white;border-radius:12px;padding:4px 12px}
.names{display:flex;justify-content:space-between;max-width:900px;margin:5px auto 0;font-weight:700;color:#ddd}
#arena{position:relative;height:calc(100vh - 92px);background:linear-gradient(#4b7ea8 0%,#79c6e8 48%,#5c3417 49%,#3a1e0d 100%);overflow:hidden}
.ground{position:absolute;left:0;right:0;bottom:0;height:120px;background:linear-gradient(#6b3b18,#3a1e0d);border-top:6px solid #8b4a1f}
.fighter{position:absolute;width:74px;height:140px;bottom:120px;transition:filter .1s}
.fighter.hit{filter:brightness(2)}
.fighter.blocking .body{background:#333}
.head{width:70px;height:70px;border-radius:50%;border:4px solid #111;background:#ffb6c1;font-size:38px;display:flex;align-items:center;justify-content:center;margin:auto}
.body{width:58px;height:70px;background:#222;border-radius:18px 18px 8px 8px;margin:-4px auto 0;border:3px solid #111}
.p1 .body{background:#1d4ed8}.p2 .body{background:#dc2626}
.attack-box{position:absolute;width:44px;height:28px;background:rgba(255,255,255,.35);border:2px solid white;border-radius:20px;top:78px;display:none}
.attacking .attack-box{display:block}.p1 .attack-box{right:-36px}.p2 .attack-box{left:-36px}
.message{position:absolute;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.62);border:2px solid white;border-radius:14px;padding:10px 18px;font-size:22px;font-weight:900;text-align:center;z-index:5}
.controls{position:fixed;left:0;right:0;bottom:14px;display:flex;justify-content:space-between;align-items:flex-end;padding:0 16px;z-index:20;pointer-events:none}
.cluster{display:flex;gap:10px;pointer-events:auto}.actions{display:grid;grid-template-columns:repeat(2,72px);gap:10px}
.ctrl{width:72px;height:72px;border-radius:50%;border:3px solid white;background:rgba(0,0,0,.62);color:white;font-weight:900;font-size:16px}
.ctrl:active,.ctrl.pressed{background:white;color:#111}
.restart{position:fixed;right:16px;top:104px;z-index:30;border:2px solid white;border-radius:10px;background:#111;color:white;padding:9px 13px;font-weight:900}
.hint{position:fixed;left:16px;top:104px;z-index:30;background:rgba(0,0,0,.55);padding:8px 10px;border-radius:10px;font-size:13px;line-height:1.35;color:#ddd}
@media(max-width:700px){.top{height:82px}h1{font-size:20px}.timer{font-size:20px}.hp-wrap{height:21px;width:36vw}#arena{height:calc(100vh - 82px)}.hint{display:none}.restart{top:90px}.ctrl{width:64px;height:64px;font-size:13px}.actions{grid-template-columns:repeat(2,64px)}}
</style>
</head>
<body>
<div class="top">
<h1>Mud Fighter MVP</h1>
<div class="hud"><div class="hp-wrap"><div class="hp" id="p1hp"></div></div><div class="timer" id="timer">60</div><div class="hp-wrap"><div class="hp" id="p2hp"></div></div></div>
<div class="names"><span>Blue Player</span><span>Red Bot</span></div>
</div>
<button class="restart" id="restart">Restart</button>
<div class="hint">PC: A/D move, W jump, F punch, G kick, H block</div>
<div id="arena">
<div class="message" id="message">Fight!</div>
<div class="fighter p1" id="p1"><div class="head">😎</div><div class="body"></div><div class="attack-box"></div></div>
<div class="fighter p2" id="p2"><div class="head">😡</div><div class="body"></div><div class="attack-box"></div></div>
<div class="ground"></div>
</div>
<div class="controls">
<div class="cluster"><button class="ctrl" data-input="left">←</button><button class="ctrl" data-input="right">→</button></div>
<div class="cluster actions"><button class="ctrl" data-input="jump">Jump</button><button class="ctrl" data-input="block">Block</button><button class="ctrl" data-input="punch">Punch</button><button class="ctrl" data-input="kick">Kick</button></div>
</div>
<script src="fight.js" defer></script>
</body>
</html>
