<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mud Dunk Gallery</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #dff3ff;
      overflow-x: auto;
    }

    h1 {
      text-align: center;
      padding: 20px;
    }

    .arena {
      display: flex;
      gap: 40px;
      padding: 40px;
      width: max-content;
    }

    .character {
      width: 260px;
      text-align: center;
    }

    .counter {
      background: white;
      padding: 10px;
      border-radius: 12px;
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .head {
      width: 120px;
      height: 120px;
      background: pink;
      border-radius: 50%;
      margin: auto;
      border: 4px solid black;
      font-size: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .target {
      width: 70px;
      height: 70px;
      background: red;
      border-radius: 50%;
      margin: 20px auto;
      cursor: pointer;
      border: 4px solid white;
    }

    .mud {
      width: 220px;
      height: 100px;
      background: #5c3417;
      margin: auto;
      border-radius: 40px 40px 0 0;
    }
  </style>
</head>

<body>

<h1>Mud Dunk Gallery</h1>

<div class="arena">

  <div class="character">
    <div class="counter" id="c1">128</div>

    <div class="head">😵</div>

    <div class="target" onclick="hit('c1')"></div>

    <div class="mud"></div>

    <h2>Crypto King</h2>
  </div>

  <div class="character">
    <div class="counter" id="c2">94</div>

    <div class="head">🤡</div>

    <div class="target" onclick="hit('c2')"></div>

    <div class="mud"></div>

    <h2>Fake Guru</h2>
  </div>

  <div class="character">
    <div class="counter" id="c3">212</div>

    <div class="head">😬</div>

    <div class="target" onclick="hit('c3')"></div>

    <div class="mud"></div>

    <h2>Drama Mayor</h2>
  </div>

</div>

<script>
function hit(id) {
  let counter = document.getElementById(id);

  let value = parseInt(counter.innerText);

  value++;

  counter.innerText = value;
}
</script>

</body>
</html>
